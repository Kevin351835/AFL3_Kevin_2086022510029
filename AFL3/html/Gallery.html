    <section class="page-header py-5">

    <section class="gallery-section py-4">
        <div class="container">
            <div class="row g-4" id="galleryContainer">
                
                <div class="col-lg-4 col-md-6 gallery-item" data-category="web">
                    <div class="gallery-card" data-bs-toggle="modal" data-bs-target="#galleryModal" onclick="openGalleryModal(0)">

                             alt="Web Design 1" 
                             class="gallery-img img-fluid">
                        <div class="gallery-overlay">
                            <div class="overlay-content">
                                <i class="bi bi-zoom-in"></i>
                                <h5>Momen di FDU</h5>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="col-lg-4 col-md-6 gallery-item" data-category="project">
                    <div class="gallery-card" data-bs-toggle="modal" data-bs-target="#galleryModal" onclick="openGalleryModal(1)">
                        <img src="https://i.ibb.co.com/JjFSPRyp/Whats-App-Image-2026-05-03-at-11-48-33-1.jpg" 
                             alt="Project 1" 
                             class="gallery-img img-fluid">
                        <div class="gallery-overlay">
                            <div class="overlay-content">

                                <h5>Momen di FDU</h5>
                            </div>

                </div>
                
                <div class="col-lg-4 col-md-6 gallery-item" data-category="web">
                    <div class="gallery-card" data-bs-toggle="modal" data-bs-target="#galleryModal" onclick="openGalleryModal(3)">
                        <img src="https://i.ibb.co.com/99MJLhCk/Whats-App-Image-2026-05-03-at-11-48-33.jpg" 
                             alt="Web Design 2" 
                             class="gallery-img img-fluid">
                        <div class="gallery-overlay">
                            <div class="overlay-content">
                                <i class="bi bi-zoom-in"></i>
                                <h5>Momen di FDU</h5>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="noResults" class="text-center py-5 d-none">
                <i class="bi bi-folder2-open" style="font-size: 4rem; color: #6c63ff;"></i>
                <h3 class="text-white mt-3">Tidak Ada Gambar</h3>
                <p class="text-white-50">Tidak ada gambar dalam kategori ini.</p>

    <div class="modal fade" id="galleryModal" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content bg-dark">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-white" id="modalTitle">Judul Gambar</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center p-4">
                    <img src="" alt="" id="modalImage" class="modal-gallery-img img-fluid">
                </div>
                <div class="modal-footer border-secondary">
                    <small class="text-white-50 me-auto" id="modalCounter">1 / 9</small>
                    <button class="btn btn-outline-light" onclick="prevImage()">
                        <i class="bi bi-chevron-left"></i> Sebelumnya
                    </button>
                    <button class="btn btn-outline-light" onclick="nextImage()">
                        Selanjutnya <i class="bi bi-chevron-right"></i>
                    </button>
                    <button type="button" class="btn btn-custom" data-bs-dismiss="modal">Tutup</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="../script.js"></script>
    
    <script>
        const galleryData = [
            {
                src: 'https://i.ibb.co.com/20Q9wRvQ/Whats-App-Image-2026-05-04-at-02-48-23.jpg',
                category: 'Semua',
            },
            {
                src: 'https://i.ibb.co.com/JjFSPRyp/Whats-App-Image-2026-05-03-at-11-48-33-1.jpg',
                category: 'Semua',
            },
            {
                src: 'https://i.ibb.co.com/99MJLhCk/Whats-App-Image-2026-05-03-at-11-48-33.jpg',
                category: 'Semua',
            },
        ];
        
        let currentImageIndex = 0;
        
        function openGalleryModal(index) {
            currentImageIndex = index;
            updateModalContent();
        }
        
        function updateModalContent() {
            const data = galleryData[currentImageIndex];
            document.getElementById('modalImage').src = data.src;
            document.getElementById('modalImage').alt = data.title;
            document.getElementById('modalTitle').textContent = data.title + ' - ' + data.category;
            document.getElementById('modalCounter').textContent = (currentImageIndex + 1) + ' / ' + galleryData.length;
        }
        
        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % galleryData.length;
            updateModalContent();
        }
        
        function prevImage() {
            currentImageIndex = (currentImageIndex - 1 + galleryData.length) % galleryData.length;
            updateModalContent();
        }
        
        document.addEventListener('keydown', function(e) {
            const modal = document.getElementById('galleryModal');
            if (modal.classList.contains('show')) {
                if (e.key === 'ArrowLeft') {
                    prevImage();
                } else if (e.key === 'ArrowRight') {
                    nextImage();
                }
            }
        });
        
        document.addEventListener('DOMContentLoaded', function() {
            const filterButtons = document.querySelectorAll('.btn-filter');
            const galleryItems = document.querySelectorAll('.gallery-item');
            const noResults = document.getElementById('noResults');
            
            filterButtons.forEach(button => {
                button.addEventListener('click', function() {
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    
                    this.classList.add('active');
                    
                    const filter = this.getAttribute('data-filter');
                    let visibleCount = 0;
                    
                    galleryItems.forEach(item => {
                        if (filter === 'all' || item.getAttribute('data-category') === filter) {
                            item.style.display = 'block';
                            visibleCount++;
                        } else {
                            item.style.display = 'none';
                        }
                    });
                    
                    if (visibleCount === 0) {
                        noResults.classList.remove('d-none');
                    } else {
                        noResults.classList.add('d-none');
                    }
                });
            });
        });
    </script>
    
</body>
